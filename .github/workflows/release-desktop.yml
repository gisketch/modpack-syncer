name: release-desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build and publish"
        required: true
        type: string

jobs:
  release:
    name: Build ${{ matrix.label }} release
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            platform: windows-latest
            args: ""
            rustTargets: ""
          - label: macOS Apple Silicon
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rustTargets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - label: macOS Intel
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rustTargets: "aarch64-apple-darwin,x86_64-apple-darwin"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v.+ ]]; then
            echo "Tag must start with v, got: $tag" >&2
            exit 1
          fi

          git rev-parse "$tag" >/dev/null 2>&1
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        if: matrix.rustTargets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust toolchain with macOS targets
        if: matrix.rustTargets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Verify release version matches tag
        shell: bash
        run: bun run release:verify "$RELEASE_TAG"

      - name: Typecheck frontend
        run: bun run typecheck

      - name: Build app + publish release assets
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tauriScript: bun tauri
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: gisketch//s_modpack_syncer ${{ env.RELEASE_TAG }}
          releaseBody: |
            Automated desktop builds for ${{ env.RELEASE_TAG }}.

            Download Windows or macOS installer assets from this release.
          generateReleaseNotes: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: ${{ matrix.args }}
