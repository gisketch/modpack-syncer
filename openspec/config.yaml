version: 1
project:
  name: modsync
  description: Minecraft modpack syncer + Prism launcher wrapper
  owner: gisketch
  identifier: dev.gisketch.modsync
stack:
  app: tauri-2
  frontend:
    framework: react-19
    language: typescript
    bundler: vite
    styling: tailwindcss-v4
    state: zustand
    server_state: tanstack-query
    ui_kit: shadcn-ui
  backend:
    language: rust
    runtime: tokio
    http: reqwest
    git: git2
    db: rusqlite
  package_manager: bun
  node_version: ">=20"
  rust_edition: "2021"
target_platforms:
  - linux
  - windows
  - macos
domains:
  minecraft:
    java_version: 21
    mc_versions: ["1.21.1"]
    loaders: ["neoforge", "fabric"]
launcher:
  strategy: wrap
  target: prism-launcher
source_of_truth:
  git_host: github
  git_embedded: libgit2
  object_storage: none
  cdns: ["modrinth", "curseforge"]
architecture:
  source_of_truth:
    specs: openspec/specs
    config: openspec/config.yaml
  frontend:
    pattern: feature-sliced-design
    routes: src/routes
    features: src/features/<feature-name>
    shared_ui: src/components/ui
    shared_lib: src/lib
    max_target_lines: 200
    rules:
      - Keep route files thin; move feature UI, hooks, and helpers under src/features/<feature-name>/.
      - Keep only truly reusable primitives under src/components/ui, src/lib, and src/hooks.
      - Split complex feature UI into focused components and colocated utilities.
  backend:
    pattern: feature-modules
    root: src-tauri/src
    max_target_lines: 300
    rules:
      - Keep Tauri command handlers thin and delegate domain logic to focused Rust modules.
      - Group backend code by domain capability instead of dumping all behavior into commands.rs.
      - Keep shared path, manifest, git, cache, and Prism utilities reusable but domain-neutral.
paths:
  specs: openspec/specs
  changes: openspec/changes
  archive: openspec/archive
